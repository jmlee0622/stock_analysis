spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/stockdb
    username: stock
    password: CHANGE_ME
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  config:
    import: optional:classpath:application-local.yml   # 로컬 시크릿 파일 로드 (gitignore됨)

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 5000          # 기본 TTL: 5초 (시세용)

  # OAuth2 소셜 로그인 설정 (실제 client-id/secret은 application-local.yml에 넣을 것)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: CHANGE_ME
            client-secret: CHANGE_ME
            scope: profile, email
          naver:
            client-id: CHANGE_ME
            client-secret: CHANGE_ME
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: name, email
        provider:
          naver:
            # 네이버는 Spring Security 기본 제공 목록에 없어서 직접 설정
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response   # 네이버 응답의 최상위 사용자 정보 키

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: stock-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# 소셜 로그인 완료 후 리다이렉트할 프론트엔드 주소
oauth2:
  redirect-uri: http://localhost:5173

jwt:
  secret: CHANGE_ME
  expiration: 86400000   # 24시간 (ms)

finnhub:
  api-key: CHANGE_ME
  websocket-url: wss://ws.finnhub.io
  news-url: https://finnhub.io/api/v1/news

huggingface:
  api-key: CHANGE_ME

chroma:
  url: http://localhost:8000
  collection: news-embeddings

logging:
  level:
    org.springframework.cache: TRACE
    org.springframework.data.redis: DEBUG
    com.example.stock_analysis: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    tags:
      application: stock-analysis
